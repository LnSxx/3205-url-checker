services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: url-checker-backend
    ports:
      - '3000:3000'
    environment:
      - PORT=3000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: url-checker-frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    depends_on:
      - backend
